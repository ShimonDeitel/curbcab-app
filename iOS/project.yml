name: Curbside Cab
options:
  bundleIdPrefix: com.shimondeitel.cabtrack
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Curbside Cab:
    type: application
    platform: iOS
    sources:
      - path: Curbside Cab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cabtrack
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Curbside Cab/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Curbside CabTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Curbside CabTests
      - path: Curbside Cab.storekit
    dependencies:
      - target: Curbside Cab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cabtrack.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Curbside CabUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Curbside CabUITests
    dependencies:
      - target: Curbside Cab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cabtrack.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Curbside Cab:
    build:
      targets:
        Curbside Cab: all
        Curbside CabTests: [test]
        Curbside CabUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Curbside Cab.storekit
    test:
      config: Debug
      storeKitConfiguration: Curbside Cab.storekit
      targets:
        - Curbside CabTests
        - Curbside CabUITests
    archive:
      config: Release
